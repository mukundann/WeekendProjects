<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk ITRANS Converter</title>
    <style>
        :root {
            --primary-color: #059669;
            --primary-hover: #047857;
            --background-color: #f1f5f9;
            --card-background: #ffffff;
            --text-color: #334155;
            --border-color: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-background);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        select, button {
            padding: 10px 20px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: white;
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .io-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .io-grid { grid-template-columns: 1fr; }
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 12px;
            font-size: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            resize: vertical;
        }

        .output-box {
            width: 100%;
            height: 400px;
            padding: 12px;
            font-size: 18px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #f8fafc;
            box-sizing: border-box;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .status-bar {
            margin-top: 10px;
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Bulk ITRANS to Indic Script Engine</h2>
    
    <div class="card">
        <div class="controls">
            <div>
                <label>Target Script: </label>
                <select id="scriptSelect">
                    <option value="devanagari">Devanagari (Sanskrit/Hindi)</option>
                    <option value="tamil">Tamil</option>
                </select>
            </div>
            <button id="convertBtn">Convert Bulk Text вҶ“</button>
            <div id="perfMetrics" class="status-bar"></div>
        </div>

        <div class="io-grid">
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:600;">Paste Bulk ITRANS Text Here:</label>
                <textarea id="itransInput" placeholder="Paste chapters, books, or large lists of ITRANS text here..."></textarea>
            </div>
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:600;">Converted Native Output:</label>
                <div id="scriptOutput" class="output-box"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Comprehensive ruleset object
    const rules = {
        devanagari: {
            vowels: [
                {itrans: 'aa', script: 'аӨҶ'}, {itrans: 'A', script: 'аӨҶ'},
                {itrans: 'ii', script: 'аӨҲ'}, {itrans: 'I', script: 'аӨҲ'},
                {itrans: 'uu', script: 'аӨҠ'}, {itrans: 'U', script: 'аӨҠ'},
                {itrans: 'ai', script: 'аӨҗ'}, {itrans: 'au', script: 'аӨ”'},
                {itrans: 'a', script: 'аӨ…'}, {itrans: 'i', script: 'аӨҮ'},
                {itrans: 'u', script: 'аӨү'}, {itrans: 'e', script: 'аӨҸ'},
                {itrans: 'o', script: 'аӨ“'}
            ],
            vowelSigns: {
                'a': '', 'aa': 'аӨҫ', 'A': 'аӨҫ', 'i': 'аӨҝ', 'ii': 'аҘҖ', 'I': 'аҘҖ',
                'u': 'аҘҒ', 'uu': 'аҘӮ', 'U': 'аҘӮ', 'e': 'аҘҮ', 'o': 'аҘӢ', 'ai': 'аҘҲ', 'au': 'аҘҢ'
            },
            consonants: [
                {itrans: 'kha', script: 'аӨ–'}, {itrans: 'gha', script: 'аӨҳ'},
                {itrans: 'cha', script: 'аӨҡ'}, {itrans: 'chha', script: 'аӨӣ'},
                {itrans: 'jha', script: 'аӨқ'}, {itrans: 'Tha', script: 'аӨ '},
                {itrans: 'Dha', script: 'аӨў'}, {itrans: 'tha', script: 'аӨҘ'},
                {itrans: 'dha', script: 'аӨ§'}, {itrans: 'pha', script: 'аӨ«'},
                {itrans: 'bha', script: 'аӨӯ'}, {itrans: 'ka', script: 'аӨ•'},
                {itrans: 'ga', script: 'аӨ—'}, {itrans: 'ta', script: 'аӨӨ'},
                {itrans: 'da', script: 'аӨҰ'}, {itrans: 'pa', script: 'аӨӘ'},
                {itrans: 'ba', script: 'аӨ¬'}, {itrans: 'ma', script: 'аӨ®'},
                {itrans: 'ya', script: 'аӨҜ'}, {itrans: 'ra', script: 'аӨ°'},
                {itrans: 'la', script: 'аӨІ'}, {itrans: 'va', script: 'аӨө'},
                {itrans: 'sha', script: 'аӨ¶'}, {itrans: 'Sha', script: 'аӨ·'},
                {itrans: 'sa', script: 'аӨё'}, {itrans: 'ha', script: 'аӨ№'},
                {itrans: 'na', script: 'аӨЁ'}, {itrans: 'Na', script: 'аӨЈ'},
                {itrans: 'Ta', script: 'аӨҹ'}, {itrans: 'Da', script: 'аӨЎ'}
            ],
            halant: 'аҘҚ'
        },
        tamil: {
            vowels: [
                {itrans: 'aa', script: 'а®Ҷ'}, {itrans: 'A', script: 'а®Ҷ'},
                {itrans: 'ii', script: 'а®Ҳ'}, {itrans: 'I', script: 'а®Ҳ'},
                {itrans: 'uu', script: 'а®Ҡ'}, {itrans: 'U', script: 'а®Ҡ'},
                {itrans: 'ai', script: 'а®җ'}, {itrans: 'au', script: 'а®”'},
                {itrans: 'a', script: 'а®…'}, {itrans: 'i', script: 'а®Ү'},
                {itrans: 'u', script: 'а®ү'}, {itrans: 'e', script: 'а®Һ'},
                {itrans: 'E', script: 'а®Ҹ'}, {itrans: 'o', script: 'а®’'},
                {itrans: 'O', script: 'а®“'}
            ],
            vowelSigns: {
                'a': '', 'aa': 'а®ҫ', 'A': 'а®ҫ', 'i': 'а®ҝ', 'ii': 'аҜҖ', 'I': 'аҜҖ',
                'u': 'аҜҒ', 'uu': 'аҜӮ', 'U': 'аҜӮ', 'e': 'аҜҶ', 'E': 'аҜҮ', 'o': 'аҜҠ', 
                'O': 'аҜӢ', 'ai': 'аҜҲ', 'au': 'аҜҢ'
            },
            consonants: [
                {itrans: 'ka', script: 'а®•'}, {itrans: 'nga', script: 'а®ҷ'},
                {itrans: 'cha', script: 'а®ҡ'}, {itrans: 'nja', script: 'а®һ'},
                {itrans: 'Ta', script: 'а®ҹ'}, {itrans: 'Na', script: 'а®Ј'},
                {itrans: 'ta', script: 'а®Ө'}, {itrans: 'na', script: 'а®Ё'},
                {itrans: 'pa', script: 'а®Ә'}, {itrans: 'ma', script: 'а®®'},
                {itrans: 'ya', script: 'а®Ҝ'}, {itrans: 'ra', script: 'а®°'},
                {itrans: 'la', script: 'а®І'}, {itrans: 'va', script: 'а®ө'},
                {itrans: 'zha', script: 'а®ҙ'}, {itrans: 'La', script: 'а®і'},
                {itrans: 'Ra', script: 'а®ұ'}, {itrans: 'naa', script: 'а®©'},
                {itrans: 'ja', script: 'а®ң'}, {itrans: 'sha', script: 'а®·'},
                {itrans: 'sa', script: 'а®ё'}, {itrans: 'ha', script: 'а®№'}
            ],
            halant: 'аҜҚ'
        }
    };

    // Cached, pre-sorted vowel signs to maximize search performance in loops
    const sortedVowelCache = {};
    Object.keys(rules).forEach(lang => {
        sortedVowelCache[lang] = Object.keys(rules[lang].vowelSigns).sort((a,b) => b.length - a.length);
    });

    function convertChunk(text, lang) {
        if (!text) return '';
        const currentRules = rules[lang];
        const sortedVowels = sortedVowelCache[lang];
        let result = '';
        let i = 0;
        const len = text.length;

        while (i < len) {
            let matched = false;

            // Step 1: Optimized Consonant Check
            for (let j = 0; j < currentRules.consonants.length; j++) {
                const c = currentRules.consonants[j];
                const stem = c.itrans.slice(0, -1); 
                const stemLen = stem.length;
                
                if (text.startsWith(stem, i)) {
                    let baseConsonant = c.script;
                    let vowelFound = false;
                    
                    for (let k = 0; k < sortedVowels.length; k++) {
                        const v = sortedVowels[k];
                        if (text.startsWith(v, i + stemLen)) {
                            result += baseConsonant + currentRules.vowelSigns[v];
                            i += stemLen + v.length;
                            vowelFound = true;
                            break;
                        }
                    }
                    
                    if (!vowelFound) {
                        result += baseConsonant + currentRules.halant;
                        i += stemLen;
                    }
                    matched = true;
                    break;
                }
            }

            if (matched) continue;

            // Step 2: Independent Vowel Check
            for (let j = 0; j < currentRules.vowels.length; j++) {
                const v = currentRules.vowels[j];
                if (text.startsWith(v.itrans, i)) {
                    result += v.script;
                    i += v.itrans.length;
                    matched = true;
                    break;
                }
            }

            if (matched) continue;

            // Step 3: Fast Skip non-transliterated symbols
            result += text[i];
            i++;
        }
        return result;
    }

    // Execution handler with microsecond benchmarking
    document.getElementById('convertBtn').addEventListener('click', () => {
        const inputData = document.getElementById('itransInput').value;
        const selectedLang = document.getElementById('scriptSelect').value;
        const outDiv = document.getElementById('scriptOutput');
        const metricsDiv = document.getElementById('perfMetrics');

        outDiv.textContent = "Processing bulk data...";
        metricsDiv.textContent = "";

        // Wrap execution in a macro-task timeout to let the UI display the loader text
        setTimeout(() => {
            const t0 = performance.now();
            
            // Process text block cleanly
            const convertedText = convertChunk(inputData, selectedLang);
            
            const t1 = performance.now();
            
            outDiv.textContent = convertedText;
            metricsDiv.textContent = `Processed ${inputData.length.toLocaleString()} characters in ${((t1 - t0)).toFixed(2)} ms.`;
        }, 50);
    });
</script>

</body>
</html>
